#Maximum thrust of the redstone thruster (at full power and speed)
# Default: 600.0
# Range: 0.0 ~ 10000.0
redstoneThrusterThrust = 600.0
#Maximum airflow of the redstone thruster (at full power and speed)
# Default: 1.0
# Range: 0.0 ~ 1000000.0
redstoneThrusterAirflow = 1.0
#Kinetic speed in RPM where the redstone thruster reaches full configured thrust
# Default: 256.0
# Range: 1.0 ~ 4096.0
redstoneThrusterMaxThrustRpm = 256.0
#Thrust of the blaze thruster on low-grade fuel (sticks etc.)
# Default: 80.0
# Range: 0.0 ~ 100000.0
blazeThrusterLowThrust = 80.0
#Thrust of the blaze thruster on normal fuel (coal, logs etc.)
# Default: 700.0
# Range: 0.0 ~ 100000.0
blazeThrusterHighThrust = 700.0
#Thrust of the blaze thruster on superheated fuel (blaze cake)
# Default: 1500.0
# Range: 0.0 ~ 100000.0
blazeThrusterBlueThrust = 1500.0
